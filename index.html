<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        .container{
            width: 500px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2{
            color: #0066cc;
        }

        input, select{
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        .add-btn{
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        .add-btn:hover{
            background-color: #218838;
        }

        .delete-btn{
            background-color: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        table{
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th{
            background-color: #0066cc;
            color: white;
            padding: 10px;
        }

        td{
            padding: 10px;
            border: 1px solid #ddd;
        }

        h3{
            color: red;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Expense Tracker System</h2>

    <input type="date" id="date"><br>

    <input type="number" id="amount" placeholder="Enter Amount"><br>

    <select id="category">
        <option value="">Select Category</option>
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        <option value="Education">Education</option>
        <option value="Other">Other</option>
    </select><br><br>

    <button class="add-btn" onclick="addExpense()">Add Expense</button>

    <table id="expenseTable">
        <tr>
            <th>Date</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Action</th>
        </tr>
    </table>

    <h3>Total Expense: ₹<span id="total">0</span></h3>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let total = 0;

function displayExpenses() {
    let table = document.getElementById("expenseTable");

    while(table.rows.length > 1) {
        table.deleteRow(1);
    }

    total = 0;

    expenses.forEach((expense, index) => {
        let row = table.insertRow();

        row.insertCell(0).innerHTML = expense.date;
        row.insertCell(1).innerHTML = expense.amount;
        row.insertCell(2).innerHTML = expense.category;

        let btn = document.createElement("button");
        btn.innerHTML = "Delete";
        btn.className = "delete-btn";
        btn.onclick = function() {
            deleteExpense(index);
        };

        row.insertCell(3).appendChild(btn);

        total += Number(expense.amount);
    });

    document.getElementById("total").innerHTML = total;
}

function addExpense() {
    let date = document.getElementById("date").value;
    let amount = document.getElementById("amount").value;
    let category = document.getElementById("category").value;

    if(date === "" || amount === "" || category === "") {
        alert("Please fill all fields");
        return;
    }

    expenses.push({
        date: date,
        amount: amount,
        category: category
    });

    localStorage.setItem("expenses", JSON.stringify(expenses));

    displayExpenses();

    document.getElementById("date").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("category").value = "";
}

function deleteExpense(index) {
    expenses.splice(index, 1);
    localStorage.setItem("expenses", JSON.stringify(expenses));
    displayExpenses();
}

displayExpenses();
</script>

</body>
</html>
