<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker Report-Computer Science Department</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        .container{
            width: 500px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2{
            color: #0066cc;
        }

        input, select{
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        .add-btn{
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        .add-btn:hover{
            background-color: #218838;
        }

        .delete-btn{
            background-color: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        table{
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th{
            background-color: #0066cc;
            color: white;
            padding: 10px;
        }

        td{
            padding: 10px;
            border: 1px solid #ddd;
        }

        h3{
            color: red;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Expense Details </h2>

    <input type="date" id="date"><br>

    <input type="number" id="amount" placeholder="Enter Amount"><br>

    <select id="category">
        <option value="">Select Category</option>
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        <option value="Education">Education</option>
        <option value="Other">Other</option>
    </select><br><br>

    <button class="add-btn" onclick="addExpense()">Add Expense</button>

    <button class="add-btn" onclick="printExpenses()" style="background-color:#007bff;">
    Print Expenses
    </button>

    
    <table id="expenseTable">
        <tr>
            <th>Date</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Action</th>
        </tr>
    </table>

    <h3>Total Expense: ₹<span id="total">0</span></h3>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let total = 0;

function displayExpenses() {
    let table = document.getElementById("expenseTable");

    while(table.rows.length > 1) {
        table.deleteRow(1);
    }

    total = 0;

    expenses.forEach((expense, index) => {
        let row = table.insertRow();

        row.insertCell(0).innerHTML = expense.date;
        row.insertCell(1).innerHTML = expense.amount;
        row.insertCell(2).innerHTML = expense.category;
let actionCell = row.insertCell(3);

// Delete button
let deleteBtn = document.createElement("button");
deleteBtn.innerHTML = "Delete";
deleteBtn.className = "delete-btn";
deleteBtn.onclick = function () {
    deleteExpense(index);
};

// Print button
let printBtn = document.createElement("button");
printBtn.innerHTML = "Print";
printBtn.style.backgroundColor = "#007bff";
printBtn.style.color = "white";
printBtn.style.border = "none";
printBtn.style.padding = "5px 10px";
printBtn.style.marginLeft = "5px";
printBtn.style.cursor = "pointer";
printBtn.style.borderRadius = "5px";
printBtn.onclick = function () {
    printExpense(expense);
};

actionCell.appendChild(deleteBtn);
actionCell.appendChild(printBtn);
        
        total += Number(expense.amount);
    });

    document.getElementById("total").innerHTML = total;
}

function addExpense() {
    let date = document.getElementById("date").value;
    let amount = document.getElementById("amount").value;
    let category = document.getElementById("category").value;

    if(date === "" || amount === "" || category === "") {
        alert("Please fill all fields");
        return;
    }

    expenses.push({
        date: date,
        amount: amount,
        category: category
    });

    localStorage.setItem("expenses", JSON.stringify(expenses));

    displayExpenses();

    document.getElementById("date").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("category").value = "";
}

function deleteExpense(index) {
    expenses.splice(index, 1);
    localStorage.setItem("expenses", JSON.stringify(expenses));
    displayExpenses();
}

function printExpenses() {
    let table = document.getElementById("expenseTable").outerHTML;
    let totalExpense = document.getElementById("total").innerHTML;

    let printWindow = window.open("", "", "width=800,height=600");

    printWindow.document.write(`
        <html>
        <head>
            <title>Expense Report</title>
            <style>
                body{
                    font-family: Arial, sans-serif;
                    padding:20px;
                }
                h2{
                    text-align:center;
                    color:#0066cc;
                }
                table{
                    width:100%;
                    border-collapse:collapse;
                }
                th, td{
                    border:1px solid #000;
                    padding:10px;
                    text-align:center;
                }
                th{
                    background:#0066cc;
                    color:white;
                }
                button{
                    display:none;
                }
            </style>
        </head>
        <body>
            <h2>Expense Report</h2>
            ${table}
            <h3>Total Expense: ₹${totalExpense}</h3>
        </body>
        </html>
    `);

    printWindow.document.close();
    printWindow.print();
    printWindow.close();
}
function printExpense(expense) {
    let printWindow = window.open("", "", "width=600,height=500");

    printWindow.document.write(`
        <html>
        <head>
            <title>Expense Receipt</title>
            <style>
                body{
                    font-family: Arial, sans-serif;
                    padding:30px;
                }
                h2{
                    text-align:center;
                    color:#0066cc;
                }
                table{
                    width:100%;
                    border-collapse:collapse;
                    margin-top:20px;
                }
                th, td{
                    border:1px solid #000;
                    padding:10px;
                    text-align:left;
                }
                th{
                    width:35%;
                    background:#f2f2f2;
                }
            </style>
        </head>
        <body>
            <h2>Expense Receipt</h2>

            <table>
                <tr>
                    <th>Date</th>
                    <td>${expense.date}</td>
                </tr>
                <tr>
                    <th>Amount</th>
                    <td>₹${expense.amount}</td>
                </tr>
                <tr>
                    <th>Category</th>
                    <td>${expense.category}</td>
                </tr>
            </table>

            <script>
                window.print();
            <\/script>
        </body>
        </html>
    `);

    printWindow.document.close();
}
displayExpenses();
</script>

</body>
</html>
